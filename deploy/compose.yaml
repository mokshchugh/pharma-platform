services:

  postgres:

    image: postgres:17

    container_name: pharma-postgres

    hostname: pharma-postgres

    restart: unless-stopped

    env_file:
      - .env

    environment:    
      - POSTGRES_DB: ${POSTGRES_DB}
      - POSTGRES_USER: ${POSTGRES_USER}
      - POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      - TZ: ${TZ}

    volumes:
      - ${DATA_ROOT}/postgres:/var/lib/postgresql

    ports:
      - "5432:5432"

  questdb:

    image: questdb/questdb:9.1.0

    container_name: pharma-questdb

    hostname: pharma-questdb

    restart: unless-stopped

    env_file:
      - .env

    environment:
      - TZ: ${TZ}

    volumes:
      - ${DATA_ROOT}/questdb:/var/lib/questdb
    
    ports:
      - "9000:9000"
      - "8812:8812"
      - "9009:9009"

