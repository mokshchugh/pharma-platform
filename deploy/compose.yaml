services:
  postgres:
    image: postgres:17.6
    container_name: pharma-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}

    ports:
      - "5432:5432"

    volumes:
      - ${DATA_ROOT}/postgres:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  questdb:
    image: questdb/questdb:9.1.0
    container_name: pharma-questdb

    restart: unless-stopped

    ports:
      - "9000:9000"   # Web UI
      - "8812:8812"   # PostgreSQL wire
      - "9009:9009"   # ILP TCP

    volumes:
      - ${DATA_ROOT}/questdb:/var/lib/questdb

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9000"]
      interval: 10s
      timeout: 5s
      retries: 5